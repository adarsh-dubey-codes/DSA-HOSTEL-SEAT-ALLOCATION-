/* ── UTILITY COMPONENTS ── */
function ScoreRing({score,size=120}){
  const color=score>=70?T.mint:score>=40?T.gold:T.red;
  const r=(size-16)/2;const circ=2*Math.PI*r;const dash=(score/100)*circ;
  return(
    <div style={{position:"relative",width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <svg width={size} height={size} style={{position:"absolute",transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`${color}25`} strokeWidth={10}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={10} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 1s ease"}}/>
      </svg>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Nunito',sans-serif",fontSize:size===120?32:22,fontWeight:900,color,lineHeight:1}}>{score}</div>
        <div style={{fontSize:11,color:T.gray400,fontWeight:600}}>/ 100</div>
      </div>
    </div>
  );
}

function PBar({val,max=100,color=T.saffron,h=8}){
  return(<div style={{background:T.gray200,borderRadius:h,height:h,overflow:"hidden"}}><div style={{width:`${(val/max)*100}%`,height:"100%",background:color,borderRadius:h,transition:"width 0.5s ease"}}/></div>);
}

function BadgeComp({b}){
  return(
    <div style={{textAlign:"center",padding:"12px 8px",background:b.earned?T.white:T.gray100,borderRadius:14,border:`2px solid ${b.earned?T.saffron:T.gray200}`,opacity:b.earned?1:0.45,minWidth:76}}>

      {!b.earned&&<div style={{fontSize:9,color:T.gray400,marginTop:2}}>Locked</div>}
    </div>
  );
}

function Btn({label,onClick,color=T.saffron,textColor=T.white,icon,fullWidth,sm,outline,style={}}){

    <button onClick={onClick} style={{background:outline?"transparent":color,color:outline?color:textColor,border:outline?`2px solid ${color}`:"none",borderRadius:12,padding:sm?"10px 16px":"14px 22px",fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:sm?13:15,cursor:"pointer",width:fullWidth?"100%":"auto",display:"flex",alignItems:"center",justifyContent:"center",gap:8,...style}}>

  );
}

    <div style={{background:light?T.white:T.navy,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>

/* ── MODULE SCREEN ── */
function ModuleScreen({module:m,lang,onBack,onComplete}){
  const[phase,setPhase]=useState("intro");
  const[slideIdx,setSlideIdx]=useState(0);
  const[quizIdx,setQuizIdx]=useState(0);
  const[quizScore,setQuizScore]=useState(0);
  const[selected,setSelected]=useState(null);
  const[answered,setAnswered]=useState(false);

  function selectOpt(i){
    if(answered)return;
    setSelected(i);setAnswered(true);
    if(i===m.quiz[quizIdx].ans)setQuizScore(s=>s+1);
  }
  function nextQuiz(){
    if(quizIdx<m.quiz.length-1){setQuizIdx(q=>q+1);setSelected(null);setAnswered(false);}
    else setPhase("result");
  }

  if(phase==="intro") return(
    <div style={{flex:1,background:m.color,display:"flex",flexDirection:"column",minHeight:"100%"}}>
      <div style={{padding:"16px 16px 0"}}><button onClick={onBack} style={{background:"rgba(255,255,255,0.20)",border:"none",borderRadius:12,width:40,height:40,cursor:"pointer",color:T.white,fontSize:18}}>←</button></div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 24px"}}>
        <div style={{fontSize:70,marginBottom:14}}>{m.icon}</div>
        <h1 style={{fontFamily:"'Nunito',sans-serif",fontSize:24,fontWeight:900,color:T.white,textAlign:"center",marginBottom:10}}>{lang==="hi"?m.titleHi:m.title}</h1>
        <p style={{fontSize:14,color:"rgba(255,255,255,0.72)",textAlign:"center",lineHeight:1.65,marginBottom:22}}>{lang==="hi"?m.descHi:m.desc}</p>
        <div style={{background:"rgba(255,255,255,0.14)",borderRadius:14,padding:"14px 18px",width:"100%",marginBottom:22}}>
          {[`📖 ${m.slides.length} Short Lessons`,`🎯 ${m.quiz.length} Quiz Questions`,`🏆 Earn ${m.points} Points`,`⏱️ About 3 minutes`].map((s,i)=>(
            <div key={i} style={{color:"rgba(255,255,255,0.82)",fontSize:13,fontWeight:600,marginBottom:5}}>{s}</div>
          ))}
        </div>
        <Btn label="Start Learning →" onClick={()=>setPhase("slides")} color={T.white} textColor={m.color} fullWidth/>
      </div>
    </div>
  );

  if(phase==="slides"){
    const slide=m.slides[slideIdx];
    return(
      <div style={{flex:1,background:T.offWhite,display:"flex",flexDirection:"column",minHeight:"100%"}}>
        <div style={{background:m.color,padding:"12px 16px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <button onClick={()=>setPhase("intro")} style={{background:"rgba(255,255,255,0.20)",border:"none",borderRadius:10,width:34,height:34,cursor:"pointer",color:T.white,fontSize:16}}>←</button>
            <span style={{color:"rgba(255,255,255,0.80)",fontSize:12,fontWeight:700}}>{slideIdx+1} / {m.slides.length}</span>
            <div style={{width:34}}/>
          </div>
          <div style={{display:"flex",gap:4}}>{m.slides.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=slideIdx?"rgba(255,255,255,0.90)":"rgba(255,255,255,0.22)"}}/>)}</div>
        </div>
        <div style={{padding:"20px 16px",flex:1,overflowY:"auto"}}>
          <div style={{textAlign:"center",fontSize:64,marginBottom:14}}>{slide.icon}</div>
          <h2 style={{fontFamily:"'Nunito',sans-serif",fontSize:20,fontWeight:900,color:T.navy,marginBottom:12,textAlign:"center"}}>{slide.title}</h2>
          <Card style={{padding:18}}>
            <p style={{fontSize:14,color:T.gray800,lineHeight:1.85,whiteSpace:"pre-line",margin:0}}>{slide.body}</p>
          </Card>
        </div>
        <div style={{padding:"0 16px 16px",display:"flex",gap:8}}>
          {slideIdx>0&&<Btn label="← Back" onClick={()=>setSlideIdx(i=>i-1)} color={T.gray200} textColor={T.gray800} outline sm/>}
          <Btn label={slideIdx<m.slides.length-1?"Next →":"Take Quiz →"} onClick={()=>slideIdx<m.slides.length-1?setSlideIdx(i=>i+1):setPhase("quiz")} color={m.color} fullWidth/>
        </div>
      </div>
    );
  }

  if(phase==="quiz"){
    const q=m.quiz[quizIdx];
    const letters=["A","B","C","D"];
    return(
      <div style={{flex:1,background:T.offWhite,display:"flex",flexDirection:"column",minHeight:"100%"}}>
        <div style={{background:m.color,padding:"12px 16px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <button onClick={()=>setPhase("slides")} style={{background:"rgba(255,255,255,0.20)",border:"none",borderRadius:10,width:34,height:34,cursor:"pointer",color:T.white,fontSize:16}}>←</button>
            <span style={{color:"rgba(255,255,255,0.90)",fontSize:13,fontWeight:800}}>Quiz {quizIdx+1}/{m.quiz.length}</span>
            <div style={{width:34}}/>
          </div>
          <PBar val={quizIdx} max={m.quiz.length} color="rgba(255,255,255,0.90)" h={5}/>
        </div>
        <div style={{padding:"20px 16px",flex:1,overflowY:"auto"}}>
          <div style={{textAlign:"center",fontSize:40,marginBottom:14}}>🎯</div>
          <h2 style={{fontFamily:"'Nunito',sans-serif",fontSize:17,fontWeight:800,color:T.navy,marginBottom:18,lineHeight:1.4}}>{q.q}</h2>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
            {q.opts.map((opt,i)=>{
              let bg=T.white,border=T.gray200,col=T.gray800;
              if(answered&&i===q.ans){bg=T.mintLight;border=T.mint;col="#004D3B";}
              else if(answered&&i===selected&&i!==q.ans){bg="#FFEBEE";border=T.red;col=T.red;}
              return(
                <button key={i} onClick={()=>selectOpt(i)} style={{background:bg,border:`2px solid ${border}`,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:10,cursor:answered?"default":"pointer",transition:"all 0.2s"}}>
                  <div style={{width:28,height:28,borderRadius:8,background:answered&&i===q.ans?T.mint:answered&&i===selected&&i!==q.ans?T.red:T.gray100,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Nunito',sans-serif",fontSize:12,fontWeight:800,color:answered&&(i===q.ans||(i===selected&&i!==q.ans))?T.white:T.gray600,flexShrink:0}}>{letters[i]}</div>
                  <span style={{fontSize:13,fontWeight:600,color:col,textAlign:"left",lineHeight:1.4}}>{opt}</span>
                </button>
              );
            })}
          </div>
          {answered&&(
            <Card style={{background:selected===q.ans?T.mintLight:"#FFEBEE",border:`2px solid ${selected===q.ans?T.mint:T.red}`,padding:12}}>
              <div style={{fontSize:18,marginBottom:5}}>{selected===q.ans?"✅":"❌"}</div>
              <div style={{fontSize:13,color:T.gray800,lineHeight:1.6}}>{q.exp}</div>
            </Card>
          )}
        </div>
        {answered&&<div style={{padding:"0 16px 16px"}}><Btn label={quizIdx<m.quiz.length-1?"Next Question →":"See Results 🏆"} onClick={nextQuiz} color={m.color} fullWidth/></div>}
      </div>
    );
  }

  // Result
  const pct=Math.round((quizScore/m.quiz.length)*100);
  return(
    <div style={{flex:1,background:T.offWhite,display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 20px",minHeight:"100%",overflowY:"auto"}}>
      <div style={{fontSize:64,marginBottom:14}}>{pct===100?"🏆":pct>=50?"⭐":"📚"}</div>
      <div style={{fontFamily:"'Nunito',sans-serif",fontSize:22,fontWeight:900,color:T.navy,marginBottom:6,textAlign:"center"}}>{pct===100?"Perfect Score!":pct>=50?"Well Done!":"Keep Learning!"}</div>
      <div style={{fontSize:14,color:T.gray600,marginBottom:18}}>You got {quizScore} of {m.quiz.length} correct</div>
      <ScoreRing score={pct} size={120}/>
      <div style={{background:`${m.color}15`,borderRadius:16,padding:"16px 18px",margin:"18px 0",width:"100%",textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:6}}>🏆</div>
        <div style={{fontFamily:"'Nunito',sans-serif",fontSize:16,fontWeight:800,color:m.color}}>+{m.points} Points Earned!</div>
        <div style={{fontSize:13,color:T.gray600,marginTop:4}}>{lang==="hi"?m.titleHi:m.title} module completed</div>
      </div>
      <div style={{display:"flex",gap:8,width:"100%"}}>
        <Btn label="Retry" onClick={()=>{setPhase("quiz");setQuizIdx(0);setQuizScore(0);setSelected(null);setAnswered(false);}} color={T.gray200} textColor={T.gray800} outline fullWidth/>
        <Btn label="Done ✓" onClick={()=>onComplete(m.id,m.points)} color={m.color} fullWidth/>
      </div>
    </div>
  );
}

/* ── SCORE SCREEN ── */
function ScoreScreen({lang,onBack,onScoreUpdate}){
  const L=LANG[lang];
  const[answers,setAnswers]=useState(new Array(SCORE_Q.length).fill(null));
  const[result,setResult]=useState(null);
  function answer(idx,val){const a=[...answers];a[idx]=val;setAnswers(a);}
  function calculate(){
    if(answers.includes(null))return;
    const s=answers.reduce((acc,a,i)=>acc+(a==="yes"?SCORE_Q[i].yes:0),0);
    setResult(s);onScoreUpdate(s);
  }
  const color=result!==null?(result>=70?T.mint:result>=40?T.gold:T.red):T.saffron;
  return(
    <div style={{flex:1,overflowY:"auto",background:T.offWhite}}>
      <TopBar title={L.privacyScore} back onBack={result?()=>{setResult(null);setAnswers(new Array(SCORE_Q.length).fill(null));}:onBack} light/>
      {result===null?(
        <div style={{padding:"14px 14px 100px"}}>
          <Card style={{background:`linear-gradient(135deg,${T.navy},${T.navyMid})`,border:"none",marginBottom:14}}>
            <div style={{fontSize:32,marginBottom:8}}>🔍</div>
            <div style={{fontFamily:"'Nunito',sans-serif",fontSize:16,fontWeight:800,color:T.white,marginBottom:6}}>Check Your Privacy Score</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.60)",lineHeight:1.6}}>Answer honestly. Only you can see this. It helps you understand your real risk level.</div>
          </Card>
          {SCORE_Q.map((q,i)=>(
            <Card key={i} style={{marginBottom:10}}>
              <div style={{display:"flex",gap:10,marginBottom:10}}>
                <span style={{fontSize:22}}>{q.icon}</span>
                <div style={{fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:700,color:T.navy,lineHeight:1.5}}>{lang==="hi"?q.qHi:q.q}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                {[{v:"yes",l:"✅ Yes",c:T.mint},{v:"no",l:"❌ No",c:T.red}].map(opt=>(
                  <button key={opt.v} onClick={()=>answer(i,opt.v)} style={{flex:1,padding:"11px",borderRadius:10,border:`2px solid ${answers[i]===opt.v?opt.c:T.gray200}`,background:answers[i]===opt.v?`${opt.c}15`:T.white,color:answers[i]===opt.v?opt.c:T.gray600,fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:800,cursor:"pointer"}}>{opt.l}</button>
                ))}
              </div>
            </Card>
          ))}
          <Btn label={`Calculate Score (${answers.filter(a=>a!==null).length}/${SCORE_Q.length} answered)`} onClick={calculate} color={T.saffron} fullWidth style={{opacity:answers.includes(null)?0.55:1}}/>
        </div>
      ):(
        <div style={{padding:"22px 18px 100px",textAlign:"center"}}>
          <div style={{marginBottom:14}}><ScoreRing score={result} size={140}/></div>
          <div style={{fontFamily:"'Nunito',sans-serif",fontSize:22,fontWeight:900,color,marginBottom:8}}>{result>=70?"🛡️ "+L.good:result>=40?"⚠️ "+L.average:"🚨 "+L.poor}</div>
          <div style={{fontSize:13,color:T.gray600,marginBottom:18,lineHeight:1.7}}>{result>=70?"Excellent! You have strong digital safety habits. Help others around you!":result>=40?"You're improving! Focus on 2FA and using unique passwords for each app.":"You are at risk right now. Please complete the learning modules — protect your savings!"}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
            {SCORE_Q.map((q,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:answers[i]==="yes"?T.mintLight:"#FFEBEE",borderRadius:10}}>
                <span style={{fontSize:18}}>{answers[i]==="yes"?"✅":"❌"}</span>
                <span style={{fontSize:12,color:T.gray800,fontWeight:600,flex:1,textAlign:"left"}}>{q.icon} {lang==="hi"?q.qHi:q.q}</span>
              </div>
            ))}
          </div>
          <Btn label="Retake Quiz" onClick={()=>{setAnswers(new Array(SCORE_Q.length).fill(null));setResult(null);}} color={T.gray200} textColor={T.gray800} outline fullWidth/>
        </div>
      )}
    </div>
  );
}

/* ── SCAM DETECTOR ── */
function ScamScreen({lang,onBack}){
  const L=LANG[lang];
  const[cur,setCur]=useState(0);
  const[revealed,setRevealed]=useState(false);
  const[userChoice,setUserChoice]=useState(null);
  const[correct,setCorrect]=useState(0);
  const[total,setTotal]=useState(0);
  const msg=SCAM_MSGS[cur];
  function choose(choice){
    if(revealed)return;
    setUserChoice(choice);setRevealed(true);
    if(choice===msg.type)setCorrect(c=>c+1);
    setTotal(t=>t+1);
  }
  function next(){
    if(cur<SCAM_MSGS.length-1){setCur(c=>c+1);setRevealed(false);setUserChoice(null);}
    else{setCur(0);setRevealed(false);setUserChoice(null);}
  }
  return(
    <div style={{flex:1,overflowY:"auto",background:T.offWhite}}>
      <TopBar title={L.scamDetector} back onBack={onBack} light/>
      <div style={{padding:"14px 14px 100px"}}>
        <Card style={{background:`linear-gradient(135deg,${T.navy},${T.navyMid})`,border:"none",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:"'Nunito',sans-serif",fontSize:15,fontWeight:900,color:T.white}}>{L.isThisScam}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginTop:2}}>Message {cur+1} of {SCAM_MSGS.length}</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.10)",borderRadius:12,padding:"8px 14px",textAlign:"center"}}>
              <div style={{fontFamily:"'Nunito',sans-serif",fontSize:18,fontWeight:900,color:T.mint}}>{correct}/{total}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.40)",fontWeight:700}}>CORRECT</div>
            </div>
          </div>
          <div style={{display:"flex",gap:4,marginTop:10}}>
            {SCAM_MSGS.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<cur?T.saffron:i===cur?"rgba(255,255,255,0.80)":"rgba(255,255,255,0.15)"}}/>)}
          </div>
        </Card>
        <Card style={{marginBottom:14,border:`2px solid ${revealed?(msg.type==="scam"?T.red:T.mint):T.gray200}`}}>
          <div style={{background:T.gray100,borderRadius:8,padding:"3px 10px",display:"inline-block",marginBottom:10,fontSize:12,fontWeight:700,color:T.gray600}}>{msg.icon} {msg.label}</div>
          <div style={{background:T.gray100,borderRadius:10,padding:"12px",marginBottom:12}}>
            <p style={{fontSize:13,color:T.gray900,lineHeight:1.7,margin:0}}>{msg.msg}</p>
          </div>
          {revealed&&(
            <div style={{background:msg.type==="scam"?"#FFEBEE":T.mintLight,borderRadius:10,padding:"12px",borderLeft:`3px solid ${msg.type==="scam"?T.red:T.mint}`}}>
              <div style={{fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:800,color:msg.type==="scam"?T.red:"#004D3B",marginBottom:5}}>{msg.type==="scam"?"🚨 SCAM DETECTED!":"✅ REAL MESSAGE"}</div>
              <div style={{fontSize:12,color:T.gray800,lineHeight:1.6}}>{msg.reason}</div>
            </div>
          )}
        </Card>
        {!revealed?(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <button onClick={()=>choose("scam")} style={{background:"#FFEBEE",border:`2px solid ${T.red}`,borderRadius:16,padding:"18px",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:34,marginBottom:6}}>🚨</div>
              <div style={{fontFamily:"'Nunito',sans-serif",fontSize:16,fontWeight:900,color:T.red}}>SCAM!</div>
            </button>
            <button onClick={()=>choose("real")} style={{background:T.mintLight,border:`2px solid ${T.mint}`,borderRadius:16,padding:"18px",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:34,marginBottom:6}}>✅</div>
              <div style={{fontFamily:"'Nunito',sans-serif",fontSize:16,fontWeight:900,color:T.mint}}>REAL!</div>
            </button>
          </div>
        ):(
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:6}}>{userChoice===msg.type?"🎉":"😅"}</div>
            <div style={{fontFamily:"'Nunito',sans-serif",fontSize:15,fontWeight:800,color:userChoice===msg.type?T.mint:T.red,marginBottom:14}}>{userChoice===msg.type?"Correct! You spotted it! 🎯":"Oops! Learn from this one! 📚"}</div>
            <Btn label={cur<SCAM_MSGS.length-1?"Next Message →":"Start Over 🔄"} onClick={next} color={T.saffron} fullWidth/>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── HELP SCREEN ── */
function HelpScreen({lang,onBack}){
  const L=LANG[lang];
  const[showSteps,setShowSteps]=useState(false);
  return(
    <div style={{flex:1,overflowY:"auto",background:T.offWhite}}>
      <TopBar title={L.emergencyHelp}/>
      <div style={{padding:"14px 14px 100px"}}>
        <div style={{background:`linear-gradient(135deg,${T.red},#C62828)`,borderRadius:20,padding:"22px",marginBottom:12,textAlign:"center",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-20,right:-20,fontSize:70,opacity:0.10}}>🆘</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.72)",fontWeight:700,marginBottom:4,letterSpacing:1}}>NATIONAL CYBER CRIME HELPLINE</div>
          <div style={{fontFamily:"'Nunito',sans-serif",fontSize:52,fontWeight:900,color:T.white,lineHeight:1,marginBottom:4}}>1930</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.65)",marginBottom:14}}>Free • 24/7 • All India</div>
          <button style={{background:T.white,border:"none",borderRadius:12,padding:"13px",fontFamily:"'Nunito',sans-serif",fontSize:15,fontWeight:900,color:T.red,cursor:"pointer",width:"100%"}}>📞 {L.callHelpline}</button>
        </div>
        {[
          {icon:"🌐",label:L.reportFraud,sub:"cybercrime.gov.in — Online portal",color:"#7C3AED",bg:"#F3E8FF"},
          {icon:"📱",label:"Sanchar Saathi",sub:"sancharsaathi.gov.in — SIM fraud",color:"#0891B2",bg:"#E0F2FE"},
          {icon:"🏦",label:"Bank Fraud Helpline",sub:"Call your bank's toll-free number",color:T.mint,bg:T.mintLight},
        ].map(a=>(
          <Card key={a.label} style={{marginBottom:10,background:a.bg,border:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:28}}>{a.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:800,color:a.color}}>{a.label}</div>
                <div style={{fontSize:12,color:T.gray600,marginTop:2}}>{a.sub}</div>
              </div>
              <span style={{color:a.color,fontSize:16}}>→</span>
            </div>
          </Card>
        ))}
        <Card style={{marginBottom:12}}>
          <button onClick={()=>setShowSteps(s=>!s)} style={{background:"none",border:"none",width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",padding:0}}>
            <div style={{fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:800,color:T.navy}}>{L.stepsIfScammed}</div>
            <span style={{color:T.saffron,fontSize:18}}>{showSteps?"↑":"↓"}</span>
          </button>
          {showSteps&&(
            <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>
              {[
                {n:"1",icon:"📞",title:"Call 1930 IMMEDIATELY",sub:"Time matters — faster report = better recovery chance"},
                {n:"2",icon:"🏦",title:"Call Your Bank",sub:"Ask to freeze suspicious transactions right away"},
                {n:"3",icon:"📸",title:"Take Screenshots",sub:"Save all evidence: messages, call logs, transaction IDs"},
                {n:"4",icon:"🌐",title:"File Online FIR",sub:"Report at cybercrime.gov.in with all your evidence"},
                {n:"5",icon:"👮",title:"Visit Local Cyber Cell",sub:"For serious fraud, file a formal FIR at police station"},
              ].map(s=>(
                <div key={s.n} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 12px",background:T.offWhite,borderRadius:10}}>
                  <div style={{width:30,height:30,background:T.saffron,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:900,color:T.white,flexShrink:0}}>{s.n}</div>
                  <div>
                    <div style={{fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:800,color:T.navy}}>{s.icon} {s.title}</div>
                    <div style={{fontSize:12,color:T.gray600,marginTop:2}}>{s.sub}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>
        <Card style={{background:T.navy,border:"none"}}>
          <div style={{fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:800,color:T.white,marginBottom:10}}>⚖️ Your Rights — DPDPA 2023</div>
          {["Right to know how your data is used","Right to correct your personal data","Right to get your data deleted","Right to file a formal complaint"].map((r,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginBottom:7}}>
              <span style={{color:T.saffron,fontWeight:800}}>•</span>
              <span style={{fontSize:13,color:"rgba(255,255,255,0.72)"}}>{r}</span>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

/* ── PROFILE SCREEN ── */
function ProfileScreen({lang,setLang,score,points,streak,badges,completedModules}){
  const L=LANG[lang];
  const level=points<100?"Beginner 🥉":points<250?"Learner 🥈":points<500?"Defender 🥇":"Champion 🏆";
  return(
    <div style={{flex:1,overflowY:"auto",background:T.offWhite}}>
      <TopBar title={L.profile} light/>
      <div style={{padding:"14px 14px 100px"}}>
        <Card style={{background:`linear-gradient(135deg,${T.navy},${T.navyMid})`,border:"none",textAlign:"center",marginBottom:12}}>
          <div style={{fontSize:56,marginBottom:8}}>👤</div>
          <div style={{fontFamily:"'Nunito',sans-serif",fontSize:18,fontWeight:900,color:T.white,marginBottom:6}}>Digital Learner</div>
          <span style={{background:`${T.gold}20`,color:T.gold,borderRadius:50,padding:"4px 14px",fontSize:12,fontWeight:700}}>{level}</span>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:14}}>
            {[{val:points,label:L.points,icon:"⭐"},{val:`${streak}`,label:L.streak,icon:"🔥"},{val:`${completedModules.length}/${MODULES.length}`,label:"Modules",icon:"📚"}].map(s=>(
              <div key={s.label} style={{background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"10px 6px"}}>
                <div style={{fontSize:16,marginBottom:3}}>{s.icon}</div>
                <div style={{fontFamily:"'Nunito',sans-serif",fontSize:16,fontWeight:900,color:T.white}}>{s.val}</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.45)",fontWeight:700}}>{s.label.toUpperCase()}</div>
              </div>
            ))}
          </div>
        </Card>
        <Card style={{marginBottom:12,display:"flex",alignItems:"center",gap:14}}>
          <ScoreRing score={score} size={75}/>
          <div>
            <div style={{fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:800,color:T.navy,marginBottom:4}}>Privacy Score</div>
            <div style={{fontSize:12,color:score>=70?T.mint:score>=40?T.gold:T.red,fontWeight:700}}>{score>=70?"🛡️ Guardian Level":score>=40?"⚠️ Improving":"🚨 At Risk"}</div>
          </div>
        </Card>
        <Card style={{marginBottom:12}}>
          <div style={{fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:800,color:T.navy,marginBottom:10}}>🌐 Language / भाषा</div>
          <div style={{display:"flex",gap:8}}>
            {[{code:"en",label:"🇬🇧 English"},{code:"hi",label:"🇮🇳 हिंदी"}].map(l=>(
              <button key={l.code} onClick={()=>setLang(l.code)} style={{flex:1,padding:"11px",borderRadius:10,border:`2px solid ${lang===l.code?T.saffron:T.gray200}`,background:lang===l.code?T.saffronPale:T.white,color:lang===l.code?T.saffron:T.gray600,fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:800,cursor:"pointer"}}>{l.label}</button>
            ))}
          </div>
        </Card>
        <div style={{fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:800,color:T.navy,marginBottom:8}}>{L.yourBadges}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
          {badges.map(b=><BadgeComp key={b.id} b={b}/>)}
        </div>
        <Card>
          <div style={{fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:800,color:T.navy,marginBottom:10}}>🗺️ Module Progress</div>
          {MODULES.map(m=>(
            <div key={m.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:700,color:T.gray800}}>{m.icon} {m.title}</span>
                <span style={{fontSize:12,color:completedModules.includes(m.id)?T.mint:T.gray400}}>{completedModules.includes(m.id)?"✅ Done":"Pending"}</span>
              </div>
              <PBar val={completedModules.includes(m.id)?100:0} color={m.color} h={5}/>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

/* ── BOTTOM NAV ── */
function BottomNav({active,setTab,lang}){
  const L=LANG[lang];
  const tabs=[{id:"home",icon:"🏠",label:L.home},{id:"learn",icon:"📚",label:L.learn},{id:"score",icon:"🔍",label:L.score},{id:"help",icon:"🆘",label:L.help},{id:"profile",icon:"👤",label:L.profile}];
  return(
    <div style={{position:"absolute",bottom:0,left:0,right:0,background:T.white,borderTop:`1px solid ${T.gray200}`,display:"flex",padding:"6px 0 14px",boxShadow:"0 -4px 20px rgba(0,0,0,0.08)",zIndex:90}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"3px 0"}}>
          <div style={{fontSize:20,opacity:active===t.id?1:0.4,transform:active===t.id?"scale(1.15)":"scale(1)",transition:"all 0.2s"}}>{t.icon}</div>
          <span style={{fontSize:9,fontWeight:800,color:active===t.id?T.saffron:T.gray400,letterSpacing:0.3}}>{t.label.toUpperCase()}</span>
          {active===t.id&&<div style={{width:4,height:4,borderRadius:2,background:T.saffron}}/>}
        </button>
      ))}
    </div>
  );
}

/* ── ROOT APP ── */
function App(){
  const[onboarded,setOnboarded]=useState(false);
  const[lang,setLang]=useState("en");
  const[tab,setTab]=useState("home");
  const[subScreen,setSubScreen]=useState(null);
  const[score,setScore]=useState(45);
  const[points,setPoints]=useState(80);
  const[streak,setStreak]=useState(3);
  const[completedModules,setCompletedModules]=useState(["social"]);
  const[badges,setBadges]=useState(BADGES_DATA.map((b,i)=>({...b,earned:i<1})));

  function nav(screen,data){
    if(["home","learn","score","help","profile"].includes(screen)){setTab(screen);setSubScreen(null);}
    else setSubScreen({screen,data});
  }

  function handleModuleComplete(moduleId,pts){
    setCompletedModules(prev=>prev.includes(moduleId)?prev:[...prev,moduleId]);
    setPoints(p=>p+pts);
    const nb=[...badges];
    if(!nb.find(b=>b.id==="first_lesson").earned)nb.find(b=>b.id==="first_lesson").earned=true;
    if(moduleId==="password")nb.find(b=>b.id==="password_pro").earned=true;
    if(moduleId==="otp")nb.find(b=>b.id==="otp_guardian").earned=true;
    setBadges(nb);
    setSubScreen(null);setTab("home");
  }

  const phone={
    width:375,height:760,background:T.offWhite,borderRadius:44,overflow:"hidden",
    position:"relative",boxShadow:"0 28px 70px rgba(0,0,0,0.40),0 0 0 10px #1a1a1a,0 0 0 12px #2a2a2a,inset 0 0 0 2px rgba(255,255,255,0.08)",
    display:"flex",flexDirection:"column",fontFamily:"'Nunito',sans-serif",
  };

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      {/* Title */}
      <div style={{marginBottom:20,textAlign:"center"}}>
        <div style={{fontFamily:"'Nunito',sans-serif",fontSize:26,fontWeight:900,color:"#FF6B00",letterSpacing:-0.5}}>🛡️ SafeNet India</div>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.38)",marginTop:3}}>Mobile App Prototype — Fully Interactive</div>
        <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:8,flexWrap:"wrap",maxWidth:380}}>
          {["Onboarding","Dashboard","4 Modules","Live Quiz","Privacy Score","Scam Detector","Emergency Help","Badges","English+Hindi"].map(f=>(
            <span key={f} style={{background:"rgba(255,107,0,0.14)",border:"1px solid rgba(255,107,0,0.28)",borderRadius:50,padding:"3px 9px",fontSize:10,color:"#FF8C38",fontWeight:700}}>{f}</span>
          ))}
        </div>
      </div>

      {/* Phone */}
      <div style={phone}>
        {/* Status bar */}
        <div style={{background:T.navy,padding:"8px 18px 4px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <span style={{color:T.white,fontSize:12,fontWeight:700}}>{new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            <span style={{color:T.white,fontSize:11}}>▂▄▆</span>
            <span style={{color:T.white,fontSize:12}}>WiFi</span>
            <span style={{color:T.white,fontSize:12}}>🔋</span>
          </div>
        </div>

        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
          {!onboarded?(
            <OnboardingScreen onDone={()=>setOnboarded(true)} setLang={setLang} lang={lang}/>
          ):subScreen?(
            <>
              {subScreen.screen==="module"&&<ModuleScreen module={subScreen.data} lang={lang} onBack={()=>setSubScreen(null)} onComplete={handleModuleComplete}/>}
              {subScreen.screen==="scam"&&<ScamScreen lang={lang} onBack={()=>setSubScreen(null)}/>}
            </>
          ):(
            <>
              {tab==="home"&&<HomeScreen nav={nav} lang={lang} score={score} points={points} streak={streak} badges={badges} completedModules={completedModules}/>}
              {tab==="learn"&&<LearnScreen nav={nav} lang={lang} completedModules={completedModules}/>}
              {tab==="score"&&<ScoreScreen lang={lang} onBack={()=>setTab("home")} onScoreUpdate={(s)=>{setScore(s);if(s>=80){const nb=[...badges];nb.find(b=>b.id==="privacy_hero").earned=true;setBadges(nb);}}}/>}
              {tab==="help"&&<HelpScreen lang={lang} onBack={()=>setTab("home")}/>}
              {tab==="profile"&&<ProfileScreen lang={lang} setLang={setLang} score={score} points={points} streak={streak} badges={badges} completedModules={completedModules}/>}
            </>
          )}
          {onboarded&&!subScreen&&<BottomNav active={tab} setTab={setTab} lang={lang}/>}
        </div>
      </div>

      <div style={{marginTop:18,maxWidth:375,textAlign:"center"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.30)",lineHeight:1.7}}>
          👆 Swipe through onboarding → Explore all 5 tabs → Open a module → Take the quiz → Check your Privacy Score → Try the Scam Detector!
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
